# @package _global_
#
# Phase 6 — VICReg arm, seed 0 (Kaggle TPU v5e-8 / SPMD).
# VICReg variance and covariance are all-gathered before loss computation.
defaults:
  - override /data: ucf101_medium
  - override /model: ucf101_medium_phase6
  - override /training: ucf101_pretrain_phase6_vicreg

seed: 0

trainer:
  max_steps: 75000
  accelerator: tpu
  devices: 8

data:
  batch_size: 64
  num_workers: 4
  persistent_workers: false
