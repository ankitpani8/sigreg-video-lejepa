# @package _global_
#
# Phase 6 — SIGReg arm, seed 0 (GPU / Lightning).
# CausalTubeMasker + StochasticPredictor + SIGReg regularizer.
# 128×128, ViT-Tiny, predictor depth=12, 75k steps.
defaults:
  - override /data: ucf101_medium
  - override /model: ucf101_medium_phase6
  - override /training: ucf101_pretrain_phase6_sigreg

seed: 0

trainer:
  max_steps: 75000
  accelerator: auto
  precision: 16-mixed
  enable_progress_bar: true
  logger: true

data:
  batch_size: 32
  num_workers: 4
  persistent_workers: true
