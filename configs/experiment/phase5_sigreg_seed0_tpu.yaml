# @package _global_
#
# Phase 5 — SIGReg mode, seed 0, Kaggle TPU v5e-8.
# Identical to phase5_sigreg_seed0 except: tpu accelerator, bf16-mixed precision,
# 8 devices, xla strategy, persistent_workers=false.
defaults:
  - override /data: ucf101_medium
  - override /model: ucf101_medium
  - override /training: ucf101_pretrain_sigreg_p5

seed: 0

trainer:
  max_steps: 75000
  accelerator: tpu
  devices: 8
  strategy: xla
  precision: bf16-mixed
  enable_progress_bar: true
  logger: true

data:
  batch_size: 32
  num_workers: 4
  persistent_workers: false
