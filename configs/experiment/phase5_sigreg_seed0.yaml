# @package _global_
#
# Phase 5 — SIGReg mode, seed 0.
# SharedTargetEncoder (default in ucf101_medium) + lam=0.02.
# 128×128, 2,048 tubelets, ViT-Tiny, predictor depth=12, 75k steps.
defaults:
  - override /data: ucf101_medium
  - override /model: ucf101_medium
  - override /training: ucf101_pretrain_sigreg_p5

seed: 0

trainer:
  max_steps: 75000
  accelerator: auto
  precision: 16-mixed
  enable_progress_bar: true
  logger: true

data:
  batch_size: 32
  num_workers: 4
  persistent_workers: true
