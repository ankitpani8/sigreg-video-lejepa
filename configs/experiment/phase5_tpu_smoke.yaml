# @package _global_
#
# Phase 5c TPU smoke — verifies SPMD pretrain_tpu.py runs end-to-end without errors.
# Run on Kaggle TPU session: python scripts/pretrain_tpu.py +experiment=phase5_tpu_smoke
defaults:
  - override /model: smoke_test_tpu

trainer:
  max_steps: 50
  accelerator: tpu   # ignored by pretrain_tpu.py (SPMD handles device selection)
  devices: 8         # ignored by pretrain_tpu.py
  strategy: xla      # ignored by pretrain_tpu.py
  precision: bf16-true  # ignored by pretrain_tpu.py (autocast applied manually)
  enable_progress_bar: false
  logger: false

data:
  batch_size: 8  # batch_size=8 = 1/core minimum for SPMD; smoke test only
  num_workers: 0
  persistent_workers: false
