# @package _global_
#
# Phase 5 / 5c — EMA baseline mode, seed 1, Kaggle TPU v5e-8 (SPMD).
# Run: python scripts/pretrain_tpu.py +experiment=phase5_ema_seed1_tpu ...
# trainer.* fields below are IGNORED by pretrain_tpu.py; kept for config symmetry.
defaults:
  - override /data: ucf101_medium
  - override /model: ucf101_medium
  - override /training: ucf101_pretrain_ema_p5

seed: 1

model:
  target_encoder:
    _target_: sigreg_video_lejepa.models.target_encoder.EMATargetEncoder

trainer:
  max_steps: 75000
  accelerator: tpu
  devices: 8
  strategy: xla
  precision: bf16-true
  enable_progress_bar: true
  logger: true

data:
  batch_size: 64  # SPMD global batch: 8/core × 8 cores = 64; matches GPU DDP effective batch (2×32)
  num_workers: 4
  persistent_workers: false
