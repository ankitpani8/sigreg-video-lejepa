# @package _global_
#
# Phase 5 — EMA baseline mode, seed 1, Kaggle TPU v5e-8.
# Identical to phase5_ema_seed1 except: tpu accelerator, bf16-mixed precision,
# 8 devices, xla strategy, persistent_workers=false.
defaults:
  - override /data: ucf101_medium
  - override /model: ucf101_medium
  - override /training: ucf101_pretrain_ema_p5

seed: 1

model:
  target_encoder:
    _target_: sigreg_video_lejepa.models.target_encoder.EMATargetEncoder

trainer:
  max_steps: 75000
  accelerator: tpu
  devices: 8
  strategy: xla
  precision: bf16-true
  enable_progress_bar: true
  logger: true

data:
  batch_size: 32
  num_workers: 4
  persistent_workers: false
