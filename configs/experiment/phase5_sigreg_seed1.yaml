# @package _global_
#
# Phase 5 — SIGReg mode, seed 1.
defaults:
  - override /data: ucf101_medium
  - override /model: ucf101_medium
  - override /training: ucf101_pretrain_sigreg_p5

seed: 1

trainer:
  max_steps: 75000
  accelerator: auto
  precision: 16-mixed
  enable_progress_bar: true
  logger: true

data:
  batch_size: 32
  num_workers: 4
  persistent_workers: true
