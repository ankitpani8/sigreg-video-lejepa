# SIGReg training config (Phase 4).
# target_encoder is SharedTargetEncoder (set in ucf101_small model config by default).
# ema_decay: null because SharedTargetEncoder.update() is a no-op; EMA plays no role here.
lam: 0.02
ema_decay: null
lr: 3.0e-4
weight_decay: 0.05
warmup_steps: 1250  # 5% of 25000
